<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Platform - Bookmarks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">📚 StudyPlatform</a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="bookmarks.html" class="active">🔖 Bookmarks</a>
        </nav>
    </header>

    <div class="container">
        <h1>🔖 Your Bookmarks</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Select a chapter to view your saved questions</p>
        
        <div class="chapters-grid" id="bookmarkedChaptersGrid">
            <!-- Bookmarked chapters will load here -->
        </div>
        
        <div id="noBookmarksMessage" style="display: none; text-align: center; color: var(--text-secondary); margin-top: 3rem; padding: 2rem; background-color: var(--bg-card); border-radius: 8px;">
            <p>No bookmarks yet. Star questions while studying to save them here!</p>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        // Load ONLY chapters that have bookmarked questions
        function loadBookmarkedChapters() {
            const grid = document.getElementById('bookmarkedChaptersGrid');
            const noMsg = document.getElementById('noBookmarksMessage');
            
            let hasAnyBookmarks = false;
            
            for (let [chapterKey, questionIds] of Object.entries(bookmarks)) {
                if (questionIds.length > 0) {
                    hasAnyBookmarks = true;
                    const chapter = questionsData[chapterKey];
                    
                    if (!chapter) continue;
                    
                    const chapterCard = document.createElement('div');
                    chapterCard.className = 'chapter-card';
                    chapterCard.onclick = () => {
                        window.location.href = `bookmarks-play.html?chapter=${chapterKey}`;
                    };
                    
                    chapterCard.innerHTML = `
                        <h3>${chapter.chapterName}</h3>
                        <p>${questionIds.length} bookmarked ${questionIds.length === 1 ? 'question' : 'questions'}</p>
                        <small>Click to start →</small>
                    `;
                    
                    grid.appendChild(chapterCard);
                }
            }
            
            if (!hasAnyBookmarks) {
                noMsg.style.display = 'block';
                grid.style.display = 'none';
            } else {
                noMsg.style.display = 'none';
                grid.style.display = 'grid';
            }
        }
        
        loadBookmarkedChapters();
    </script>
</body>
</html>
