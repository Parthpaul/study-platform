<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Platform - Bookmarks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">📚 StudyPlatform</a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="bookmarks.html" class="active">🔖 Bookmarks</a>
        </nav>
    </header>

    <div class="container">
        <h1>🔖 Your Bookmarks</h1>
        
        <div class="bookmarks-container" id="bookmarksContainer">
            <!-- Bookmarks will be loaded here -->
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        function loadBookmarks() {
            const container = document.getElementById('bookmarksContainer');
            container.innerHTML = '';
            
            let hasBookmarks = false;
            
            for (let [chapterKey, questionIds] of Object.entries(bookmarks)) {
                if (questionIds.length === 0) continue;
                
                hasBookmarks = true;
                const chapter = questionsData[chapterKey];
                
                if (!chapter) continue;
                
                const chapterDiv = document.createElement('div');
                chapterDiv.innerHTML = `<h2 style="margin: 2rem 0 1rem;">${chapter.chapterName}</h2>`;
                
                questionIds.forEach(questionId => {
                    const question = chapter.questions.find(q => q.id === questionId);
                    if (!question) return;
                    
                    const bookmarkItem = document.createElement('div');
                    bookmarkItem.className = 'bookmark-item';
                    bookmarkItem.innerHTML = `
                        <div class="delete-bookmark" onclick="removeBookmark('${chapterKey}', '${questionId}')">✕</div>
                        <div class="question-text">${question.question}</div>
                        <div class="answer-section">
                            <button class="btn-answer" onclick="showAnswer(this)">See Answer</button>
                            <div class="answer-text">${question.answer}</div>
                        </div>
                    `;
                    
                    chapterDiv.appendChild(bookmarkItem);
                });
                
                container.appendChild(chapterDiv);
            }
            
            if (!hasBookmarks) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No bookmarks yet. Star questions while studying to save them here!</p>';
            }
        }
        
        window.removeBookmark = function(chapterKey, questionId) {
            const index = bookmarks[chapterKey].indexOf(questionId);
            if (index > -1) {
                bookmarks[chapterKey].splice(index, 1);
                localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
                loadBookmarks(); // Refresh the display
            }
        };
        
        window.showAnswer = function(button) {
            const answerDiv = button.nextElementSibling;
            answerDiv.classList.toggle('show');
            button.textContent = answerDiv.classList.contains('show') ? 'Hide Answer' : 'See Answer';
        };
        
        // Load bookmarks on page load
        loadBookmarks();
    </script>
</body>
</html>
