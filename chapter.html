<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">📚 StudyPlatform</a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="bookmarks.html">🔖 Bookmarks</a>
        </nav>
    </header>

    <div class="container">
        <!-- Simple back link -->
        <div style="margin-bottom: 2rem;">
            <a href="index.html" style="color: var(--accent); text-decoration: none;">← Back to Chapters</a>
        </div>

        <!-- Question counter -->
        <div id="questionCounter" style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem;">
            Question 1/50
        </div>

        <!-- Question card - minimal design -->
        <div class="question-card-minimal" id="questionContainer">
            <!-- Question will be loaded here -->
        </div>

        <!-- Simple button row -->
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
            <button class="btn-nav" id="prevBtn">← Back</button>
            <button class="btn-answer-minimal" id="answerBtn">Show Answer</button>
            <button class="btn-nav" id="nextBtn">Next →</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        // Get chapter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const chapterKey = urlParams.get('chapter');
        
        if (!chapterKey || !questionsData[chapterKey]) {
            window.location.href = 'index.html';
        }

        const chapter = questionsData[chapterKey];
        let currentIndex = 0;
        let shuffledQuestions = [];
        let answerVisible = false;

        // Shuffle questions
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Display current question
        function displayQuestion() {
            const question = shuffledQuestions[currentIndex];
            const isBookmarked = bookmarks[chapterKey]?.includes(question.id);
            
            document.getElementById('questionCounter').textContent = 
                `Question ${currentIndex + 1}/${shuffledQuestions.length}`;
            
            const container = document.getElementById('questionContainer');
            container.innerHTML = `
                <div style="position: relative;">
                    <div class="bookmark-icon-minimal ${isBookmarked ? 'bookmarked' : ''}" 
                         onclick="toggleBookmark('${chapterKey}', '${question.id}')">
                        ${isBookmarked ? '★' : '☆'}
                    </div>
                    <div class="question-text-minimal">
                        ${question.question}
                    </div>
                    <div class="answer-text-minimal" id="answerDisplay" style="display: none;">
                        ${question.answer}
                    </div>
                </div>
            `;
            
            answerVisible = false;
            document.getElementById('answerBtn').textContent = 'Show Answer';
        }

        // Toggle bookmark
        window.toggleBookmark = function(chapterKey, questionId) {
            if (!bookmarks[chapterKey]) {
                bookmarks[chapterKey] = [];
            }
            
            const index = bookmarks[chapterKey].indexOf(questionId);
            if (index === -1) {
                bookmarks[chapterKey].push(questionId);
            } else {
                bookmarks[chapterKey].splice(index, 1);
            }
            
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            displayQuestion(); // Refresh to update star
        };

        // Answer button
        document.getElementById('answerBtn').addEventListener('click', function() {
            const answerDiv = document.getElementById('answerDisplay');
            if (answerDiv) {
                if (answerVisible) {
                    answerDiv.style.display = 'none';
                    this.textContent = 'Show Answer';
                } else {
                    answerDiv.style.display = 'block';
                    this.textContent = 'Hide Answer';
                }
                answerVisible = !answerVisible;
            }
        });

        // Navigation
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (currentIndex < shuffledQuestions.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; // Loop back
            }
            displayQuestion();
        });

        document.getElementById('prevBtn').addEventListener('click', function() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = shuffledQuestions.length - 1; // Loop to end
            }
            displayQuestion();
        });

        // Initialize
        shuffledQuestions = shuffleArray([...chapter.questions]);
        displayQuestion();
    </script>
</body>
</html>
